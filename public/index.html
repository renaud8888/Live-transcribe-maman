<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#fbf4e7">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Interprète du gîte">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="stylesheet" href="/styles.css">
    <title>Interprète du gîte</title>
  </head>
  <body>
    <main class="app-shell">
      <section id="homeView" class="view home-view is-active" aria-labelledby="homeTitle">
        <div class="home-hero">
          <p class="eyebrow">Accueil voyageurs</p>
          <h1 id="homeTitle">Interprète du gîte</h1>
          <p class="home-subtitle">Parlez facilement avec vos invités et montrez-leur les informations utiles.</p>
        </div>

        <section class="home-panel" aria-label="Démarrer">
          <label class="field-label" for="guestLanguage">Langue de l’invité</label>
          <div class="select-wrap">
            <select id="guestLanguage" name="guestLanguage">
              <option value="en">Anglais</option>
              <option value="nl">Néerlandais</option>
              <option value="de">Allemand</option>
              <option value="es">Espagnol</option>
              <option value="it">Italien</option>
              <option value="pl">Polonais</option>
              <option value="pt">Portugais</option>
              <option value="ar">Arabe</option>
              <option value="tr">Turc</option>
              <option value="uk">Ukrainien</option>
              <option value="ja">Japonais</option>
              <option value="ko">Coréen</option>
              <option value="zh">Chinois</option>
            </select>
          </div>

          <div class="home-actions">
            <button id="openTranslateView" class="launch-card launch-card-host" type="button">
              <span>Traduction face-à-face</span>
              <small>Parler, écrire ou dicter entre vous et l’invité.</small>
            </button>
            <button id="openMessagesView" class="launch-card launch-card-guest" type="button">
              <span>Messages utiles du gîte</span>
              <small>Préparer les infos essentielles et les afficher en grand.</small>
            </button>
          </div>
        </section>

        <details class="settings-panel">
          <summary>Réglages</summary>
          <label class="field-label" for="accessCode">Code d’accès</label>
          <input id="accessCode" type="password" inputmode="numeric" autocomplete="off" placeholder="Code facultatif">
        </details>
      </section>

      <section id="translateView" class="view translate-view" aria-labelledby="translateTitle">
        <header class="compact-bar translate-bar">
          <button class="back-button" type="button" data-go-home>Retour</button>
          <div>
            <p id="translateTitle">Face-à-face</p>
            <strong id="translateLanguageLabel">Anglais</strong>
          </div>
          <button id="stopLiveButton" class="stop-button" type="button" disabled>Arrêter</button>
          <div id="statusBadge" class="status status-ready" role="status" aria-live="polite">
            <span class="status-light" aria-hidden="true"></span>
            <span id="statusText">Prêt</span>
          </div>
        </header>

        <section class="conversation-board" aria-label="Traduction face-à-face">
          <article class="person-panel guest-panel is-flipped" aria-labelledby="guestPanelTitle">
            <div class="person-content">
              <div class="person-heading">
                <div>
                  <p id="guestPanelTitle" class="person-label">Invité</p>
                  <strong id="guestPanelLanguage">Anglais</strong>
                </div>
                <span id="guestPanelHint" class="hint">Écrivez ou dictez ici</span>
              </div>
              <textarea id="guestText" class="translation-textarea" autocomplete="off" placeholder="La traduction pour l’invité apparaîtra ici."></textarea>
              <div class="panel-actions">
                <button id="guestSpeakButton" class="primary-action guest-action" type="button">L’invité parle</button>
                <button id="readGuestButton" class="secondary-action read-action" type="button">Lire</button>
                <button id="clearGuestButton" class="secondary-action clear-action" type="button">Effacer</button>
              </div>
            </div>
          </article>

          <article class="person-panel host-panel" aria-labelledby="hostPanelTitle">
            <div class="person-content">
              <div class="person-heading">
                <div>
                  <p id="hostPanelTitle" class="person-label">Vous</p>
                  <strong>Français</strong>
                </div>
                <span class="hint">Écrivez ou dictez ici</span>
              </div>
              <textarea id="hostText" class="translation-textarea" autocomplete="off" placeholder="Écrivez ou dictez en français."></textarea>
              <div class="panel-actions">
                <button id="hostSpeakButton" class="primary-action host-action" type="button">Je parle</button>
                <button id="readHostButton" class="secondary-action read-action" type="button">Lire</button>
                <button id="clearHostButton" class="secondary-action clear-action" type="button">Effacer</button>
              </div>
            </div>
          </article>
        </section>
      </section>

      <section id="messagesView" class="view messages-view" aria-labelledby="messagesTitle">
        <header class="compact-bar messages-bar">
          <button class="back-button" type="button" data-go-home>Retour</button>
          <div>
            <p id="messagesTitle">Messages utiles du gîte</p>
            <strong id="messagesLanguageLabel">Anglais</strong>
          </div>
          <button id="saveMessagesButton" class="save-button" type="button">Enregistrer</button>
        </header>

        <div id="messageCards" class="message-list" aria-live="polite"></div>
      </section>
    </main>

    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

    <dialog id="guestDisplayDialog" class="guest-dialog" aria-labelledby="guestDisplayLanguage">
      <div class="guest-display">
        <header class="guest-display-header">
          <div>
            <p id="guestDisplayLanguage">Anglais</p>
            <strong id="guestDisplayTitle">Message</strong>
          </div>
          <button id="closeGuestDisplayButton" class="secondary-action" type="button">Fermer</button>
        </header>
        <p id="guestDisplayText" class="guest-display-text"></p>
        <p id="guestDisplayFrench" class="guest-display-french"></p>
        <button id="speakGuestDisplayButton" class="primary-action guest-action" type="button">Lire</button>
      </div>
    </dialog>

    <audio id="remoteAudio" playsinline></audio>
    <script src="/app.js" defer></script>
  </body>
</html>
